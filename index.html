<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sona toki pona — a course</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://davidar.github.io" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "kern" 1;
  }
  button { font-family: inherit; }
  input  { font-family: inherit; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  ::selection { background: rgba(180,140,100,0.3); }

  /* ─────────────────────────────────────────────────────────────
     sitelen pona webfonts
     linja pona 4.1 — jan Same / David A Roberts — SIL OFL
     nasin nanpa    — jan Itan (etbcor)           — SIL OFL
     Both use OpenType ligatures: typing a toki pona word
     renders its sitelen pona glyph.
     ───────────────────────────────────────────────────────────── */
  @font-face {
    font-family: 'linja pona';
    src: url('https://davidar.github.io/linja-pona/linja-pona-4.1.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'nasin nanpa';
    src: url('https://cdn.jsdelivr.net/gh/lipu-linku/nasin-sitelen@main/nasin-nanpa.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Local config — API key lives here, not in source -->
<script src="config.js"></script>

<script>
  window.__TWEAKS = /*EDITMODE-BEGIN*/{
